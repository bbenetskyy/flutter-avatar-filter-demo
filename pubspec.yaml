name: flutter_avatar_filter_demo
description: "A small Flutter demo showcasing avatar filtering flow with GetX and clean UI structure."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: 3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/
    - assets/svg/
    - assets/avatars/

  uses-material-design: true
